<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Marcos Adventure - Ultra Edition</title>
    <style>
        :root {
            --neon-blue: #00f7ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffcc00;
            --neon-purple: #8800ff;
            --neon-red: #ff3131;
            --fury-color: #ff3300;
            --scanline: rgba(18, 16, 16, 0.1);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            background: #020205;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
        }

        #gameContainer {
            position: relative;
            border: 2px solid #1a1a1a;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 247, 255, 0.1), inset 0 0 20px rgba(0,0,0,0.5);
            background: #000;
            overflow: hidden;
            /* Fills screen on mobile, capped on desktop */
            width: min(100vw, calc(100vh * 1.25));
            height: min(100vh, calc(100vw * 0.8));
            max-width: 1000px;
            max-height: 800px;
        }

        #gameContainer::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(var(--scanline) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: saturate(1.2) contrast(1.1);
            touch-action: none;
        }

        /* ── TOP UI ── */
        #ui {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 60;
        }

        .stat-box {
            background: rgba(0, 0, 5, 0.75);
            padding: 6px 10px;
            border: 1px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.1);
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            font-size: clamp(9px, 1.8vw, 13px);
            color: white;
        }

        .hp-bar-bg {
            width: clamp(90px, 20vw, 150px);
            height: 10px;
            background: rgba(255,255,255,0.1);
            margin-top: 4px;
            border: 1px solid #333;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0088ff, var(--neon-blue), #ffffff);
            background-size: 200% 100%;
            animation: flow 2s linear infinite;
            transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: -200% 50%; } }

        .boss-ui { border-color: rgba(255, 0, 255, 0.3); text-align: right; }

        /* ── SCREENS ── */
        #victoryScreen, #startScreen {
            display: none;
            text-align: center;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 20px;
            border: 2px solid var(--neon-gold);
            width: 85%;
        }

        #startScreen { display: block; border-color: var(--neon-blue); }

        .glitch-text {
            color: var(--neon-gold);
            font-size: clamp(1.8em, 6vw, 3em);
            text-shadow: 3px 3px var(--neon-pink), -3px -3px var(--neon-blue);
            margin: 0 0 10px 0;
        }

        .subtitle { color: var(--neon-blue); font-size: clamp(9px, 2vw, 12px); margin-bottom: 20px; }

        button {
            padding: clamp(10px, 2vw, 15px) clamp(25px, 6vw, 50px);
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: inherit;
            font-weight: bold;
            font-size: clamp(12px, 2.5vw, 16px);
            transition: 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        button:hover, button:active { background: var(--neon-blue); color: #000; box-shadow: 0 0 40px var(--neon-blue); }

        #furyAlert {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-weight: bold;
            font-size: clamp(13px, 3vw, 20px);
            padding: 4px 18px;
            background: var(--fury-color);
            display: none;
            z-index: 70;
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
            white-space: nowrap;
        }

        /* ══════════════════════════
           MOBILE TOUCH CONTROLS
        ══════════════════════════ */
        #mobileControls {
            display: none; /* shown via JS on touch device */
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 130px;
            z-index: 80;
            pointer-events: none; /* children set their own */
        }

        /* Joystick zone */
        #joystickZone {
            position: absolute;
            left: 20px;
            bottom: 15px;
            width: 110px;
            height: 110px;
            pointer-events: all;
            touch-action: none;
        }

        #joystickBase {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(0, 247, 255, 0.35);
            background: rgba(0, 247, 255, 0.06);
            position: relative;
            box-shadow: 0 0 18px rgba(0, 247, 255, 0.2);
        }

        #joystickKnob {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(0, 247, 255, 0.8), rgba(0, 100, 180, 0.6));
            border: 2px solid var(--neon-blue);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--neon-blue);
            transition: box-shadow 0.1s;
            pointer-events: none;
        }

        /* Fire button */
        #fireBtn {
            position: absolute;
            right: 25px;
            bottom: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255, 49, 49, 0.7), rgba(120, 0, 0, 0.6));
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 18px rgba(255,49,49,0.4);
            pointer-events: all;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
        }

        #fireBtn.active {
            transform: scale(0.92);
            box-shadow: 0 0 30px rgba(255,49,49,0.8);
            background: radial-gradient(circle at 35% 35%, rgba(255, 100, 100, 0.9), rgba(180, 0, 0, 0.8));
        }

        /* Keyboard hint for desktop */
        #keyHint {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(0, 247, 255, 0.4);
            pointer-events: none;
            z-index: 60;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameContainer">

        <div id="furyAlert">OVERDRIVE ATIVADO</div>

        <div id="startScreen">
            <h1 class="glitch-text" style="color:var(--neon-blue)">MARCOS REVENGE</h1>
            <p class="subtitle">[ STATUS: OPERACIONAL ]</p>
            <p style="color:rgba(255,255,255,0.4); font-size:clamp(9px,1.8vw,11px); margin-bottom:20px;">
                🎮 Mobile: joystick + botão FIRE<br>⌨️ Desktop: WASD/setas + ESPAÇO
            </p>
            <button id="startBtn">CONECTAR</button>
        </div>

        <div id="ui">
            <div class="stat-box">
                <div>WEAPON: <span id="weaponLevel" style="color: var(--neon-blue);">LVL 1</span></div>
                <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            </div>
            <div class="stat-box boss-ui">
                <div id="bossName" style="color: var(--neon-pink);">HOSTILE...</div>
                <div style="font-size:clamp(14px,3.5vw,22px); font-weight:bold;"><span id="bossHp">0</span>%</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="1000" height="800"></canvas>

        <!-- Mobile Controls -->
        <div id="mobileControls">
            <div id="joystickZone">
                <div id="joystickBase">
                    <div id="joystickKnob"></div>
                </div>
            </div>
            <div id="fireBtn">FIRE</div>
        </div>

        <div id="keyHint">WASD / ↑↓←→ mover · ESPAÇO atirar</div>

        <div id="victoryScreen">
            <h1 class="glitch-text">VITÓRIA SUPREMA</h1>
            <img id="victoryGif" style="max-width:clamp(100px,25vw,200px); border-radius:50%; border:4px solid var(--neon-gold); margin:15px 0;">
            <p style="color:white; font-size:clamp(11px,2vw,14px);">A paz de Marcos foi restaurada em todo o Universo!</p>
            <button onclick="location.reload()">REINICIAR</button>
        </div>
    </div>

    <!-- Hidden image sources -->
    <div style="display:none;">
        <img id="playerImgSource" src="marcos4.jpg">
        <img id="imgQuecedisse" src="quecedisse.png">
        <img id="imgQuetristeza" src="quetristeza.png">
        <img id="imgBossAbsoluto" src="bossAbsoluto.png">
    </div>

<script>
/* ═══════════════════════════════════════════
   CANVAS SCALING — lógica interna em 1000×800
   CSS cuida do redimensionamento visual
═══════════════════════════════════════════ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
// Canvas interno sempre 1000×800; CSS escala via width:100%/height:100%
const CW = 1000, CH = 800;
canvas.width  = CW;
canvas.height = CH;

/* ─── Audio ─── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol = 0.1) {
    try {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

/* ─── State ─── */
let gameState     = 'start';
let frames        = 0;
let shake         = 0;
let particles     = [];
let bullets       = [];
let items         = [];
let currentBossIdx = 0;
let bosses        = [];

/* ─── Keyboard ─── */
const keys = {
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
    w: false, s: false, a: false, d: false, ' ': false
};
document.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) { keys[e.key] = true; e.preventDefault(); }});
document.addEventListener('keyup',   e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

/* ═══════════════════════════════════════════
   VIRTUAL JOYSTICK
═══════════════════════════════════════════ */
const joystickZone = document.getElementById('joystickZone');
const joystickBase = document.getElementById('joystickBase');
const joystickKnob = document.getElementById('joystickKnob');

const joystick = {
    active: false,
    originX: 0, originY: 0,
    dx: 0, dy: 0,
    touchId: null,
    maxRadius: 33,
};

function getCanvasScale() {
    // ratio between CSS pixels and canvas internal pixels
    const rect = canvas.getBoundingClientRect();
    return { sx: CW / rect.width, sy: CH / rect.height };
}

function joystickStart(e) {
    if (joystick.active) return;
    const t = e.changedTouches[0];
    joystick.active  = true;
    joystick.touchId = t.identifier;
    const rect = joystickBase.getBoundingClientRect();
    joystick.originX = rect.left + rect.width  / 2;
    joystick.originY = rect.top  + rect.height / 2;
    joystickMove(e);
}

function joystickMove(e) {
    if (!joystick.active) return;
    for (const t of e.changedTouches) {
        if (t.identifier !== joystick.touchId) continue;
        let dx = t.clientX - joystick.originX;
        let dy = t.clientY - joystick.originY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > joystick.maxRadius) {
            dx = dx / dist * joystick.maxRadius;
            dy = dy / dist * joystick.maxRadius;
        }
        joystick.dx = dx / joystick.maxRadius; // –1 … 1
        joystick.dy = dy / joystick.maxRadius;
        joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
}

function joystickEnd(e) {
    for (const t of e.changedTouches) {
        if (t.identifier === joystick.touchId) {
            joystick.active  = false;
            joystick.dx      = 0;
            joystick.dy      = 0;
            joystick.touchId = null;
            joystickKnob.style.transform = 'translate(-50%, -50%)';
        }
    }
}

joystickZone.addEventListener('touchstart',  joystickStart,  { passive: false });
joystickZone.addEventListener('touchmove',   joystickMove,   { passive: false });
joystickZone.addEventListener('touchend',    joystickEnd,    { passive: false });
joystickZone.addEventListener('touchcancel', joystickEnd,    { passive: false });

/* ═══════════════════════════════════════════
   FIRE BUTTON
═══════════════════════════════════════════ */
const fireBtn = document.getElementById('fireBtn');
let   fireTouchActive = false;

fireBtn.addEventListener('touchstart',  e => { e.preventDefault(); fireTouchActive = true;  fireBtn.classList.add('active'); }, { passive: false });
fireBtn.addEventListener('touchend',    e => { e.preventDefault(); fireTouchActive = false; fireBtn.classList.remove('active'); }, { passive: false });
fireBtn.addEventListener('touchcancel', e => { fireTouchActive = false; fireBtn.classList.remove('active'); });

/* ─── Prevent default scroll / zoom on the whole container ─── */
document.getElementById('gameContainer').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ═══════════════════════════════════════════
   DETECT TOUCH DEVICE → show mobile controls
═══════════════════════════════════════════ */
function isTouchDevice() {
    return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
}

/* ─── Particles ─── */
class Particle {
    constructor(x, y, color, size = 3, speed = 8) {
        this.x = x; this.y = y; this.color = color;
        this.size  = Math.random() * size + 1;
        this.vx    = (Math.random() - 0.5) * speed;
        this.vy    = (Math.random() - 0.5) * speed;
        this.life  = 1.0;
        this.decay = Math.random() * 0.03 + 0.02;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw() {
        ctx.globalAlpha  = this.life;
        ctx.fillStyle    = this.color;
        ctx.shadowBlur   = 8; ctx.shadowColor = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha  = 1; ctx.shadowBlur  = 0;
    }
}

/* ─── Player ─── */
class Player {
    constructor() {
        this.width  = 50; this.height = 50;
        this.x = CW/2 - 25; this.y = CH - 100;
        this.speed  = 7; this.hp = 100;
        this.weaponLevel = 1; this.lastShot = 0; this.shootDelay = 180;
        this.furyMode = 0;
    }
    takeDamage(amount) {
        if (this.furyMode <= 0) {
            this.hp -= amount; shake = 12;
            if (frames % 5 === 0) playSound(50, 'square', 0.2);
            for (let i=0; i<5; i++) particles.push(new Particle(this.x+25, this.y+25, 'red', 4));
        }
    }
    update() {
        // Combine keyboard + joystick
        let moveX = 0, moveY = 0;
        if (keys.ArrowLeft  || keys.a) moveX -= 1;
        if (keys.ArrowRight || keys.d) moveX += 1;
        if (keys.ArrowUp    || keys.w) moveY -= 1;
        if (keys.ArrowDown  || keys.s) moveY += 1;

        // Joystick input (adds, so both can work simultaneously)
        moveX += joystick.dx;
        moveY += joystick.dy;

        // Normalise diagonal
        const mag = Math.sqrt(moveX*moveX + moveY*moveY);
        if (mag > 1) { moveX /= mag; moveY /= mag; }

        this.x = Math.max(0, Math.min(CW - this.width,  this.x + moveX * this.speed));
        this.y = Math.max(0, Math.min(CH - this.height, this.y + moveY * this.speed));

        if (this.furyMode > 0) {
            this.furyMode--;
            document.getElementById('furyAlert').style.display = 'block';
            if (frames % 2 === 0) particles.push(new Particle(this.x + Math.random()*50, this.y + 50, '#ff3300', 4, 4));
        } else {
            document.getElementById('furyAlert').style.display = 'none';
        }

        if (frames % 4 === 0) particles.push(new Particle(this.x + this.width/2, this.y + this.height, '#00f7ff', 2, 2));

        const wantFire = keys[' '] || fireTouchActive;
        const delay    = this.furyMode > 0 ? 90 : this.shootDelay;
        if (wantFire && Date.now() - this.lastShot > delay) {
            this.shoot();
            this.lastShot = Date.now();
        }
    }
    draw() {
        ctx.save();
        if (this.furyMode > 0) {
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff3300';
            ctx.filter = `hue-rotate(${frames * 5}deg) brightness(1.5)`;
        } else {
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f7ff';
        }
        try { ctx.drawImage(document.getElementById('playerImgSource'), this.x, this.y, this.width, this.height); }
        catch(e) { ctx.fillStyle = '#00f7ff'; ctx.fillRect(this.x, this.y, this.width, this.height); }
        ctx.restore();
    }
    shoot() {
        const isFury = this.furyMode > 0;
        const color  = isFury ? '#ff3300' : (this.weaponLevel >= 4 ? '#ffcc00' : '#00f7ff');
        playSound(isFury ? 400 : 200 + (this.weaponLevel * 50), 'square', 0.1);
        const mx = this.x + this.width/2 - 3;
        const lvl = isFury ? 4 : this.weaponLevel;
        if      (lvl === 1) { bullets.push(new Bullet(mx, this.y, -12, 'player', color)); }
        else if (lvl === 2) { bullets.push(new Bullet(mx-15, this.y, -11, 'player', color)); bullets.push(new Bullet(mx+15, this.y, -11, 'player', color)); }
        else if (lvl === 3) { bullets.push(new Bullet(mx, this.y, -12, 'player', color)); bullets.push(new Bullet(mx-20, this.y, -10, 'player', color, -1.5)); bullets.push(new Bullet(mx+20, this.y, -10, 'player', color, 1.5)); }
        else                { for(let i=-2; i<=2; i++) bullets.push(new Bullet(mx, this.y, -10, 'player', color, i*2.5)); }
    }
}

/* ─── Bullet ─── */
class Bullet {
    constructor(x, y, vY, owner, color, vX = 0) {
        this.x = x; this.y = y; this.vY = vY; this.vX = vX;
        this.owner = owner; this.color = color;
        this.width = 5; this.height = 15;
        this.markedForDeletion = false;
    }
    update() {
        this.y += this.vY; this.x += this.vX;
        if (this.y < -50 || this.y > CH + 50) this.markedForDeletion = true;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
    }
}

/* ─── Boss base ─── */
class Boss {
    constructor(name, maxHp, color, img) {
        this.name = name; this.maxHp = maxHp; this.hp = maxHp;
        this.color = color; this.img = img;
        this.x = CW/2 - 75; this.y = -200;
        this.width = 150; this.height = 100;
        this.timer = 0; this.flash = 0;
    }
    takeDamage() {
        const factor = player.furyMode > 0 ? 0.04 : 0.025;
        this.hp -= this.maxHp * factor;
        this.flash = 5; shake = 6;
        playSound(100, 'sawtooth', 0.05, 0.05);
        for (let i=0; i<5; i++) particles.push(new Particle(this.x + Math.random()*this.width, this.y + Math.random()*this.height, this.color));
    }
    drawHP() {
        document.getElementById('bossHp').innerText   = Math.max(0, Math.floor((this.hp/this.maxHp)*100));
        document.getElementById('bossName').innerText = this.name;
    }
    applyFlash() {
        if (this.flash > 0) { ctx.filter = 'brightness(5) contrast(2)'; this.flash--; }
    }
    checkPlayerCollision(p) { if(intersect(p, this)) p.takeDamage(0.5); }
}

class Boss1 extends Boss {
    update() {
        if (this.y < 80) this.y += 2;
        this.timer++;
        this.x = (CW/2 - this.width/2) + Math.sin(this.timer * 0.03) * 350;
        if (this.timer % 40 === 0) { bullets.push(new Bullet(this.x + this.width/2, this.y + this.height, 6, 'boss', 'red')); playSound(80, 'sine', 0.2); }
        this.checkPlayerCollision(player);
    }
    draw() {
        ctx.save(); this.applyFlash();
        ctx.shadowBlur = 25; ctx.shadowColor = this.color;
        ctx.drawImage(this.img, this.x, this.y, this.width, this.height);
        ctx.restore(); ctx.filter = 'none';
        this.drawHP();
    }
}

class Boss2 extends Boss {
    update() {
        if (this.y < 100) this.y += 2;
        this.timer += 0.05;
        if (frames % 25 === 0) {
            const bx = this.x + 75 + Math.cos(this.timer)*100;
            const by = this.y + 50 + Math.sin(this.timer)*100;
            bullets.push(new Bullet(bx, by, 5, 'boss', '#ff9900'));
        }
        this.checkPlayerCollision(player);
    }
    draw() {
        const x1 = this.x + Math.cos(this.timer)*150, y1 = this.y + Math.sin(this.timer)*150;
        const x2 = this.x + Math.cos(this.timer+Math.PI)*150, y2 = this.y + Math.sin(this.timer+Math.PI)*150;
        ctx.save(); this.applyFlash();
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff9900';
        ctx.drawImage(this.img, x1, y1, 90, 90);
        ctx.drawImage(this.img, x2, y2, 90, 90);
        ctx.restore(); ctx.filter = 'none';
        this.drawHP();
    }
    checkPlayerCollision(p) {
        const x1 = this.x + Math.cos(this.timer)*150, y1 = this.y + Math.sin(this.timer)*150;
        const x2 = this.x + Math.cos(this.timer+Math.PI)*150, y2 = this.y + Math.sin(this.timer+Math.PI)*150;
        if(intersect(p,{x:x1,y:y1,width:90,height:90}) || intersect(p,{x:x2,y:y2,width:90,height:90})) p.takeDamage(0.5);
    }
    checkCollision(rect) {
        const x1 = this.x + Math.cos(this.timer)*150, y1 = this.y + Math.sin(this.timer)*150;
        const x2 = this.x + Math.cos(this.timer+Math.PI)*150, y2 = this.y + Math.sin(this.timer+Math.PI)*150;
        return intersect(rect,{x:x1,y:y1,width:90,height:90}) || intersect(rect,{x:x2,y:y2,width:90,height:90});
    }
}

class Boss3 extends Boss {
    constructor(n,h,c,i) { super(n,h,c,i); this.width=300; this.height=200; }
    update() {
        this.timer++;
        this.y = 100 + Math.sin(this.timer*0.04)*60;
        this.x = (CW/2 - this.width/2) + Math.sin(this.timer*0.02)*300;
        if (this.timer % 45 === 0) {
            for(let i=-3; i<=3; i++) bullets.push(new Bullet(this.x + this.width/2, this.y + this.height, 4, 'boss', '#bc13fe', i*3));
            playSound(60, 'sawtooth', 0.3);
        }
        this.checkPlayerCollision(player);
    }
    draw() {
        ctx.save(); this.applyFlash();
        ctx.shadowBlur = 40; ctx.shadowColor = 'purple';
        ctx.drawImage(this.img, this.x, this.y, this.width, this.height);
        ctx.restore(); ctx.filter = 'none';
        this.drawHP();
    }
}

const intersect = (r1, r2) => !(r2.x > r1.x+r1.width || r2.x+r2.width < r1.x || r2.y > r1.y+r1.height || r2.y+r2.height < r1.y);

let player = new Player();

/* ─── Start ─── */
document.getElementById('startBtn').addEventListener('click',     startGame);
document.getElementById('startBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('startScreen').style.display = 'none';

    // Show mobile controls only on touch devices
    if (isTouchDevice()) {
        document.getElementById('mobileControls').style.display = 'block';
        document.getElementById('keyHint').style.display = 'none';
    }

    bosses = [
        new Boss1("O QUE CÊ DISSE?",  200, '#ff4444', document.getElementById('imgQuecedisse')),
        new Boss2("QUE TRISTEZA",      450, '#ff9900', document.getElementById('imgQuetristeza')),
        new Boss3("MARCOS ABSOLUTO",   900, '#8800ff', document.getElementById('imgBossAbsoluto')),
    ];
    gameState = 'playing';
    loop();
}

/* ─── Main loop ─── */
function loop() {
    if (gameState !== 'playing') return;
    frames++;

    ctx.save();
    if (shake > 0) { ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2); shake *= 0.9; }

    // Background
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i=0; i<60; i++) {
        const sX = (i * 137) % CW;
        const sY = (i * 159 + frames * (i%3 + 1)) % CH;
        ctx.fillRect(sX, sY, 1.5, 1.5);
    }

    player.update();
    let boss = bosses[currentBossIdx];
    if (boss) boss.update();

    // Items
    if (frames % 400 === 0) {
        const types = ['heal', 'multishot', 'fury'];
        items.push({ x: Math.random()*(CW-30), y: -50, type: types[Math.floor(Math.random()*3)], size: 25 });
    }
    items.forEach((it, idx) => {
        it.y += 3.5;
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.fillStyle    = it.type === 'heal' ? '#00ff00' : it.type === 'multishot' ? '#ffff00' : '#ff3300';
        ctx.shadowColor  = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(it.x+12, it.y+12, 12 + Math.sin(frames*0.15)*4, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        if (intersect(player, {x:it.x, y:it.y, width:25, height:25})) {
            if (it.type === 'heal')      player.hp = Math.min(100, player.hp + 30);
            if (it.type === 'multishot') player.weaponLevel = Math.min(4, player.weaponLevel + 1);
            if (it.type === 'fury')     { player.furyMode = 300; playSound(800, 'sawtooth', 0.5); }
            else playSound(600, 'sine', 0.2);
            items.splice(idx, 1);
        }
    });

    // Bullets
    bullets.forEach(b => {
        b.update();
        if (b.owner === 'player') {
            if (boss && (boss.checkCollision ? boss.checkCollision(b) : intersect(b, boss))) {
                boss.takeDamage(); b.markedForDeletion = true;
            }
        } else if (intersect(b, player)) {
            player.takeDamage(10); b.markedForDeletion = true;
        }
    });

    // Boss defeated?
    if (boss && boss.hp <= 0) {
        playSound(150, 'sawtooth', 0.5); shake = 20;
        for (let i=0; i<60; i++) particles.push(new Particle(boss.x+boss.width/2, boss.y+boss.height/2, boss.color, 10));
        currentBossIdx++;
        if (currentBossIdx >= bosses.length) { gameState = 'victory'; showVictory(); }
        else { player.hp = Math.min(100, player.hp + 40); }
    }

    // Player dead?
    if (player.hp <= 0) { gameState = 'gameOver'; location.reload(); }

    bullets = bullets.filter(b => !b.markedForDeletion);
    particles.forEach((p, i) => { p.update(); if (p.life <= 0) particles.splice(i, 1); else p.draw(); });
    bullets.forEach(b => b.draw());
    player.draw();
    if (boss) boss.draw();

    // HUD
    document.getElementById('hp-fill').style.width = player.hp + '%';
    const levelText = player.furyMode > 0 ? 'FÚRIA TOTAL' : `NÍVEL ${player.weaponLevel}`;
    document.getElementById('weaponLevel').innerText = levelText;
    document.getElementById('weaponLevel').style.color = player.furyMode > 0 ? 'var(--fury-color)' : 'var(--neon-blue)';

    ctx.restore();
    if (gameState === 'playing') requestAnimationFrame(loop);
}

function showVictory() {
    document.getElementById('ui').style.display = 'none';
    document.getElementById('mobileControls').style.display = 'none';
    document.getElementById('victoryScreen').style.display  = 'block';
    document.getElementById('victoryGif').src = 'marcos1.gif';
}
</script>
